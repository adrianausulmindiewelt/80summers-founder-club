<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>100 Dinge — Bucket List | Next Generation Founders Club</title>
  <meta name="description" content="100 Dinge, die ich erleben will, bevor ich 80 bin. Deine persönliche Bucket List.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bitter:ital,wght@0,400;0,700;1,400;1,700&family=Poppins:wght@200;400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --ink: #111010;
      --ink-mid: #3a3a3a;
      --ink-soft: #6b6b6b;
      --ink-faint: #999;
      --surface: #ffffff;
      --bg: #fafafa;
      --bg-dark: #141312;
      --red: #6b0f18;
      --red-mid: #8a1a24;
      --red-tint: #f8ecee;
      --orange: #e07b39;
      --fh: 'Poppins', sans-serif;
      --fb: 'Bitter', serif;
      --radius: 16px;
      --card-shadow: 0 2px 16px rgba(0,0,0,.07);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--fb);
      font-size: 17px;
      line-height: 1.7;
      color: var(--ink-mid);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* ── Header ── */
    .page-header {
      background: var(--bg-dark);
      padding: 20px 0;
    }

    .header-inner {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .back-link {
      font-family: var(--fh);
      font-weight: 600;
      font-size: .82rem;
      color: rgba(255,255,255,.5);
      text-decoration: none;
      transition: color .2s;
    }

    .back-link:hover { color: rgba(255,255,255,.8); }

    .header-logo {
      height: 28px;
      width: auto;
      opacity: .8;
    }

    /* ── Hero ── */
    .bl-hero {
      background: var(--bg-dark);
      color: #fff;
      padding: 60px 0 80px;
      text-align: center;
    }

    .bl-hero h1 {
      font-family: var(--fh);
      font-weight: 800;
      font-size: clamp(2rem, 5vw, 3.2rem);
      line-height: 1.12;
      letter-spacing: -.03em;
      margin-bottom: 16px;
    }

    .bl-hero h1 em {
      font-family: var(--fb);
      font-style: italic;
      color: var(--orange);
      font-weight: 700;
    }

    .bl-hero p {
      font-family: var(--fb);
      font-style: italic;
      font-size: 1rem;
      color: rgba(255,255,255,.4);
      max-width: 480px;
      margin: 0 auto;
      line-height: 1.6;
    }

    .progress-bar-wrap {
      max-width: 400px;
      margin: 32px auto 0;
    }

    .progress-label {
      font-family: var(--fh);
      font-weight: 600;
      font-size: .72rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: rgba(255,255,255,.35);
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
    }

    .progress-track {
      height: 6px;
      background: rgba(255,255,255,.08);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--red), var(--orange));
      border-radius: 3px;
      width: 0%;
      transition: width .6s ease;
    }

    /* ── Main ── */
    .bl-main {
      max-width: 960px;
      margin: 0 auto;
      padding: 56px 24px 100px;
    }

    /* ── Controls ── */
    .bl-controls {
      display: flex;
      gap: 12px;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }

    .add-input-wrap {
      flex: 1;
      min-width: 240px;
      position: relative;
    }

    .add-input {
      width: 100%;
      font-family: var(--fb);
      font-size: .95rem;
      padding: 14px 20px;
      border: 2px solid var(--bg);
      border-radius: 12px;
      background: var(--surface);
      color: var(--ink);
      outline: none;
      transition: border-color .2s;
      box-shadow: var(--card-shadow);
    }

    .add-input:focus {
      border-color: var(--red);
    }

    .add-input::placeholder {
      color: var(--ink-faint);
    }

    .add-btn {
      font-family: var(--fh);
      font-weight: 600;
      font-size: .85rem;
      color: #fff;
      background: var(--red);
      border: none;
      padding: 14px 28px;
      border-radius: 12px;
      cursor: pointer;
      transition: background .2s, transform .2s;
      white-space: nowrap;
    }

    .add-btn:hover {
      background: var(--red-mid);
      transform: translateY(-1px);
    }

    /* ── Filter tabs ── */
    .filter-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 32px;
    }

    .filter-tab {
      font-family: var(--fh);
      font-weight: 600;
      font-size: .72rem;
      letter-spacing: .06em;
      text-transform: uppercase;
      padding: 8px 16px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      background: transparent;
      color: var(--ink-faint);
      transition: all .2s;
    }

    .filter-tab:hover { color: var(--ink-mid); }
    .filter-tab.active {
      background: var(--surface);
      color: var(--ink);
      box-shadow: var(--card-shadow);
    }

    /* ── List ── */
    .bl-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .bl-item {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 20px 22px;
      box-shadow: var(--card-shadow);
      transition: transform .2s ease, box-shadow .2s ease;
      cursor: pointer;
      user-select: none;
    }

    .bl-item:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 24px rgba(0,0,0,.09);
    }

    .bl-item.done {
      background: var(--red-tint);
    }

    .bl-item.done .bl-text {
      text-decoration: line-through;
      color: var(--ink-faint);
    }

    .bl-check {
      flex-shrink: 0;
      width: 24px;
      height: 24px;
      border: 2px solid #ddd;
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 1px;
      transition: all .25s ease;
      font-size: .75rem;
      color: transparent;
    }

    .bl-item.done .bl-check {
      background: var(--red);
      border-color: var(--red);
      color: #fff;
    }

    .bl-num {
      font-family: var(--fh);
      font-weight: 700;
      font-size: .68rem;
      color: var(--ink-faint);
      min-width: 22px;
      margin-top: 3px;
    }

    .bl-text {
      flex: 1;
      font-size: .92rem;
      line-height: 1.5;
      color: var(--ink-mid);
    }

    .bl-delete {
      flex-shrink: 0;
      width: 24px;
      height: 24px;
      border: none;
      background: none;
      cursor: pointer;
      font-size: .85rem;
      color: transparent;
      transition: color .2s;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
    }

    .bl-item:hover .bl-delete { color: var(--ink-faint); }
    .bl-delete:hover { color: var(--red) !important; background: var(--red-tint); }

    /* ── Empty state ── */
    .bl-empty {
      text-align: center;
      padding: 80px 0;
      color: var(--ink-faint);
      font-family: var(--fb);
      font-style: italic;
    }

    /* ── Suggestions ── */
    .suggestions-section {
      margin-top: 64px;
      padding-top: 48px;
      border-top: 1px solid #eee;
    }

    .suggestions-title {
      font-family: var(--fh);
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--ink);
      margin-bottom: 20px;
    }

    .suggestion-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .suggestion-chip {
      font-family: var(--fh);
      font-size: .78rem;
      font-weight: 500;
      color: var(--ink-soft);
      background: var(--surface);
      border: 1px solid #eee;
      padding: 8px 16px;
      border-radius: 100px;
      cursor: pointer;
      transition: all .2s;
    }

    .suggestion-chip:hover {
      border-color: var(--red);
      color: var(--red);
      background: var(--red-tint);
    }

    .suggestion-chip.added {
      opacity: .4;
      pointer-events: none;
    }

    /* ── Responsive ── */
    @media (max-width: 700px) {
      .bl-grid { grid-template-columns: 1fr; }
      .bl-hero { padding: 44px 0 56px; }
      .bl-hero h1 { font-size: 1.8rem; }
      .bl-main { padding: 40px 18px 80px; }
    }
  </style>
</head>
<body>

  <header class="page-header">
    <div class="header-inner">
      <a href="/" class="back-link">&larr; Zurück</a>
      <img src="/Website Bilder/80-summers-logo-alpha.png" alt="NGFC" class="header-logo">
    </div>
  </header>

  <section class="bl-hero">
    <div style="max-width: 600px; margin: 0 auto; padding: 0 24px;">
      <h1>100 Dinge, die ich <em>erleben</em> will</h1>
      <p>Dein Leben hat ca. 80 Sommer. Was willst du mit ihnen anfangen? Schreib es auf. Hak es ab. Leb es.</p>
      <div class="progress-bar-wrap">
        <div class="progress-label">
          <span>Fortschritt</span>
          <span id="progressText">0 / 0</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>
    </div>
  </section>

  <main class="bl-main">

    <div class="bl-controls">
      <div class="add-input-wrap">
        <input type="text" class="add-input" id="addInput" placeholder="Neues Ziel hinzufügen..." maxlength="120">
      </div>
      <button class="add-btn" id="addBtn">Hinzufügen</button>
    </div>

    <div class="filter-tabs">
      <button class="filter-tab active" data-filter="all">Alle</button>
      <button class="filter-tab" data-filter="open">Offen</button>
      <button class="filter-tab" data-filter="done">Erledigt</button>
    </div>

    <div class="bl-grid" id="blGrid"></div>

    <div class="suggestions-section">
      <h3 class="suggestions-title">Inspiration gesucht?</h3>
      <div class="suggestion-chips" id="suggestionChips"></div>
    </div>

  </main>

  <script>
    var SUGGESTIONS = [
      'Alle 7 Kontinente bereisen',
      'Zwei Wochen auf einem Bauernhof leben',
      'Die 50 bekanntesten Sportarten ausprobieren',
      'Ein Buch schreiben',
      'Unter dem Sternenhimmel schlafen',
      'Eine Sprache fließend lernen',
      'Einen Marathon laufen',
      'Nordlichter sehen',
      'Ein eigenes Unternehmen gründen',
      'Fallschirmspringen',
      'Einen Sonnenaufgang auf einem Berggipfel sehen',
      'Einen Monat ohne Social Media leben',
      'Ein Instrument spielen lernen',
      'Jemandem anonym etwas Gutes tun',
      'Auf einem Vulkan stehen',
      'Eine eigene App programmieren',
      'In einem anderen Land zur Schule/Uni gehen',
      'Einen TED Talk halten',
      'Ein Korallenriff tauchen',
      'Eine Woche komplett offline verbringen',
      'Einen Fremden zum Freund machen',
      '100 Bücher lesen',
      'Ein Musikfestival besuchen',
      'Etwas bauen, das andere Menschen nutzen',
      'Den Jakobsweg laufen',
      'Einen Film drehen',
      'Eine Nacht im Dschungel verbringen',
      'Kochen lernen — richtig gut',
      'Einen persönlichen Rekord in etwas aufstellen',
      'Einen Brief an mein zukünftiges Ich schreiben'
    ];

    var STORAGE_KEY = 'ngfc-bucket-list';

    function loadItems() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
      catch(e) { return []; }
    }

    function saveItems(items) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    }

    var items = loadItems();
    var currentFilter = 'all';

    function updateProgress() {
      var total = items.length;
      var done = items.filter(function(i) { return i.done; }).length;
      document.getElementById('progressText').textContent = done + ' / ' + total;
      var pct = total > 0 ? (done / total * 100) : 0;
      document.getElementById('progressFill').style.width = pct + '%';
    }

    function render() {
      var grid = document.getElementById('blGrid');
      var filtered = items.filter(function(item) {
        if (currentFilter === 'open') return !item.done;
        if (currentFilter === 'done') return item.done;
        return true;
      });

      if (filtered.length === 0) {
        grid.innerHTML = '<div class="bl-empty" style="grid-column: 1/-1;">Noch keine Einträge — fang an zu träumen.</div>';
      } else {
        grid.innerHTML = filtered.map(function(item, idx) {
          var globalIdx = items.indexOf(item);
          return '<div class="bl-item' + (item.done ? ' done' : '') + '" data-idx="' + globalIdx + '">' +
            '<div class="bl-check">' + (item.done ? '✓' : '') + '</div>' +
            '<span class="bl-num">' + (globalIdx + 1) + '.</span>' +
            '<span class="bl-text">' + escapeHtml(item.text) + '</span>' +
            '<button class="bl-delete" data-idx="' + globalIdx + '" title="Löschen">&times;</button>' +
          '</div>';
        }).join('');
      }

      updateProgress();
      renderSuggestions();
    }

    function escapeHtml(str) {
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function addItem(text) {
      text = text.trim();
      if (!text) return;
      items.push({ text: text, done: false });
      saveItems(items);
      render();
    }

    function toggleItem(idx) {
      items[idx].done = !items[idx].done;
      saveItems(items);
      render();
    }

    function deleteItem(idx) {
      items.splice(idx, 1);
      saveItems(items);
      render();
    }

    function renderSuggestions() {
      var existing = items.map(function(i) { return i.text.toLowerCase(); });
      var container = document.getElementById('suggestionChips');
      container.innerHTML = SUGGESTIONS.map(function(s) {
        var added = existing.indexOf(s.toLowerCase()) > -1;
        return '<button class="suggestion-chip' + (added ? ' added' : '') + '" data-text="' + escapeHtml(s) + '">' + escapeHtml(s) + '</button>';
      }).join('');
    }

    // Events
    document.getElementById('addBtn').addEventListener('click', function() {
      var input = document.getElementById('addInput');
      addItem(input.value);
      input.value = '';
      input.focus();
    });

    document.getElementById('addInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        addItem(this.value);
        this.value = '';
      }
    });

    document.getElementById('blGrid').addEventListener('click', function(e) {
      var deleteBtn = e.target.closest('.bl-delete');
      if (deleteBtn) {
        e.stopPropagation();
        deleteItem(parseInt(deleteBtn.dataset.idx));
        return;
      }
      var item = e.target.closest('.bl-item');
      if (item) toggleItem(parseInt(item.dataset.idx));
    });

    document.querySelector('.filter-tabs').addEventListener('click', function(e) {
      var tab = e.target.closest('.filter-tab');
      if (!tab) return;
      document.querySelectorAll('.filter-tab').forEach(function(t) { t.classList.remove('active'); });
      tab.classList.add('active');
      currentFilter = tab.dataset.filter;
      render();
    });

    document.getElementById('suggestionChips').addEventListener('click', function(e) {
      var chip = e.target.closest('.suggestion-chip');
      if (!chip || chip.classList.contains('added')) return;
      addItem(chip.dataset.text);
    });

    // Init
    render();
  </script>

</body>
</html>
